  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #060402;
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
    }

    .intro {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .intro__bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #060402;
    }

    .intro__bg-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image: url('assets/images/hero-statue-desktop.jpg');
      background-size: cover;
      background-position: center 15%;
      background-repeat: no-repeat;
    }

    @media (max-width: 768px) {
      .intro__bg-img {
        background-image: url('assets/images/hero-statue-mobile.jpg');
        background-position: center 10%;
      }
    }

    .intro__bg-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        to bottom,
        rgba(6,4,2,0.18) 0%,
        rgba(6,4,2,0.10) 35%,
        rgba(6,4,2,0.55) 75%,
        rgba(6,4,2,0.85) 100%
      );
    }

    /* Mobile: center CTA button */
    @media (max-width: 480px) {
      .intro__bar {
        bottom: 2rem;
        right: 1.25rem;
        left: 1.25rem;
        display: flex;
        justify-content: center;
      }
    }



    /* ── Bottom CTA bar ────────────────────────────────── */
    .intro__bar {
      position: absolute;
      bottom: 2.5rem;
      right: 2.5rem;
      z-index: 30;
    }

    .intro__wordmark {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      text-decoration: none;
    }

    .intro__wordmark-name {
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.03em;
      font-family: Georgia, "Times New Roman", serif;
    }

    .intro__wordmark-tag {
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.03em;
      font-weight: 400;
    }

    .intro__tagline {
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .intro__cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #f59e0b;
      color: #1a0e00;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      padding: 0.9rem 2.25rem;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 4px rgba(245,158,11,0.18), 0 4px 28px rgba(245,158,11,0.35);
      white-space: nowrap;
    }

    .intro__cta:hover {
      background: #fcd34d;
      transform: translateY(-2px);
      box-shadow: 0 0 0 6px rgba(245,158,11,0.22), 0 8px 36px rgba(245,158,11,0.42);
    }

    .intro__cta:focus-visible {
      outline: 3px solid #f59e0b;
      outline-offset: 4px;
    }

    .intro__cta-arrow {
      font-size: 1.1em;
      line-height: 1;
      transition: transform 0.15s;
    }

    .intro__cta:hover .intro__cta-arrow {
      transform: translateX(3px);
    }

    .intro__skip {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }

    .intro__skip:hover { color: rgba(255,255,255,0.65); }

    /* ── Inscription badge ─────────────────────────────── */
    .intro__inscription {
      position: absolute;
      bottom: 42%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: clamp(0.55rem, 1.1vw, 0.75rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.30);
      white-space: nowrap;
      pointer-events: none;
    }


    /* ── Enter animation ───────────────────────────────── */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .intro__bar > * {
      opacity: 0;
      animation: fade-in-up 0.7s ease forwards;
      animation-delay: 0.4s;
    }

    @media (prefers-reduced-motion: reduce) {
      .intro__wakeup-text {
        animation: none !important;
        opacity: 0 !important;
      }
      .intro__bar > * {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }

  </style>


</head>
<body>

<main class="intro" role="main">

  <div class="intro__bg" aria-hidden="true"></div>
  <div class="intro__bg-img" aria-hidden="true" role="img" aria-label="Black woman as the Statue of Liberty, holding a lantern and broken chains against a dramatic sunset skyline"></div>
  <div class="intro__bg-overlay" aria-hidden="true"></div>



  <div class="intro__bar">
    <a href="home.html" class="intro__cta">
      Enter Chain
      <span class="intro__cta-arrow" aria-hidden="true">→</span>
    </a>
  </div>

</main>

</body>
</html>
