<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quotes — Retrieve Your Roots CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'"/>
  <link rel="stylesheet" href="css/cms.css"/>
</head>
<body>
<div class="cms-layout">
  <aside class="cms-sidebar">
    <div class="cms-sidebar__brand"><div class="cms-sidebar__brand-name">Retrieve Your Roots</div><div class="cms-sidebar__brand-sub">Content Command Center</div></div>
    <nav class="cms-sidebar__nav">
      <div class="cms-nav__section"><div class="cms-nav__section-label">Overview</div></div>
      <a href="cms-dashboard.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Content</div></div>
      <a href="cms-topics.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Historical Topics</a>
      <a href="cms-newsletters.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Newsletter Issues</a>
      <a href="cms-twitter.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>Twitter / X Posts</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Assets</div></div>
      <a href="cms-quotes.html" class="cms-nav__item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>Quotes</a>
      <a href="cms-image-prompts.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Image Prompts</a>
      <a href="cms-sources.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Sources</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Planning</div></div>
      <a href="cms-calendar.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Content Calendar</a>
    </nav>
    <div class="cms-sidebar__footer"><a href="home.html" style="color:var(--gold-dim);font-size:11px;">← Back to site</a></div>
  </aside>

  <div class="cms-main">
    <div class="cms-topbar">
      <div class="cms-topbar__title">Quotes</div>
      <div class="cms-topbar__actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Quote
        </button>
      </div>
    </div>

    <div class="cms-page">
      <div class="section-header">
        <div class="section-header__left">
          <div class="section-eyebrow">Asset Library</div>
          <div class="section-title">Quotes Archive</div>
        </div>
        <select class="filter-select" id="statusFilter" onchange="loadQuotes()">
          <option value="">All Statuses</option>
          <option value="draft">Draft</option>
          <option value="reviewed">Reviewed</option>
          <option value="published">Published</option>
        </select>
      </div>

      <!-- Quote cards -->
      <div id="quoteGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">
        <div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1">Loading…</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="qModal">
  <div class="modal" style="max-width:620px;max-height:90vh;overflow-y:auto">
    <div class="modal__header">
      <div class="modal__title" id="qModalTitle">Add Quote</div>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <form id="qForm" onsubmit="saveQuote(event)">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">Quote Text *</label>
          <textarea class="form-textarea form-textarea--tall" id="qf-text" required rows="5" placeholder="The exact quote…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Attributed To</label>
          <input type="text" class="form-input" id="qf-attr" placeholder="Name, title, year…"/>
        </div>
        <div class="form-group">
          <label class="form-label">Historical Context</label>
          <textarea class="form-textarea" id="qf-context" rows="3" placeholder="When was this said, in what context?"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Linked Topic</label>
          <select class="form-select" id="qf-topic"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Tags</label>
          <input type="text" class="form-input" id="qf-tags" placeholder="Comma-separated tags"/>
        </div>
        <div class="form-group">
          <label class="form-label">Image Prompt</label>
          <textarea class="form-textarea" id="qf-image" rows="3" placeholder="Cinematic image generation prompt for this quote…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="qf-status">
            <option value="draft">Draft</option>
            <option value="reviewed">Reviewed</option>
            <option value="published">Published</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="qSaveBtn">Save Quote</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'http://localhost:3001';
let editQId = null;
let topicsList = [];

async function init() {
  topicsList = await fetch(`${API}/cms/api/topics`).then(r=>r.json()).catch(()=>[]);
  document.getElementById('qf-topic').innerHTML = '<option value="">No linked topic</option>' + topicsList.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join('');
  loadQuotes();
}

async function loadQuotes() {
  const status = document.getElementById('statusFilter').value;
  const url = `${API}/cms/api/quotes${status ? '?status='+status : ''}`;
  try {
    const quotes = await fetch(url).then(r=>r.json());
    const grid = document.getElementById('quoteGrid');
    if (!quotes.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state__icon">💬</div><div class="empty-state__title">No quotes yet</div><div class="empty-state__sub">Build your archive of powerful historical quotes</div><button class="btn btn-primary" onclick="openModal()">Add Quote</button></div>`;
      return;
    }
    grid.innerHTML = quotes.map(q => `
      <div class="card" style="display:flex;flex-direction:column;gap:12px">
        <div style="border-left:3px solid var(--gold-border);padding-left:12px">
          <div style="font-family:var(--font-display);font-size:1rem;color:var(--text-primary);line-height:1.6;font-style:italic;margin-bottom:8px">"${esc(q.quote_text)}"</div>
          ${q.attributed_to ? `<div style="font-size:12px;color:var(--gold-dim);font-weight:600">— ${esc(q.attributed_to)}</div>` : ''}
        </div>
        ${q.historical_context ? `<div style="font-size:12px;color:var(--text-muted);line-height:1.5">${esc(q.historical_context)}</div>` : ''}
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:auto">
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="status-badge status-badge--${q.status}">${q.status}</span>
            ${q.topic_title ? `<span class="cat-pill">${esc(q.topic_title)}</span>` : ''}
          </div>
          <div class="row-actions" style="opacity:1">
            <button class="btn btn-ghost btn-sm" onclick="editQuote(${q.id})">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:#f87171" onclick="deleteQuote(${q.id})">Del</button>
          </div>
        </div>
        ${q.tags ? `<div style="font-size:11px;color:var(--text-muted)">${q.tags}</div>` : ''}
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('quoteGrid').innerHTML = `<div style="color:#f87171;padding:32px;text-align:center;grid-column:1/-1">Could not connect to CMS server.</div>`;
  }
}

function openModal() {
  editQId = null;
  document.getElementById('qModalTitle').textContent = 'Add Quote';
  document.getElementById('qForm').reset();
  document.getElementById('qModal').classList.add('open');
}

async function editQuote(id) {
  editQId = id;
  const q = await fetch(`${API}/cms/api/quotes/${id}`).then(r=>r.json());
  document.getElementById('qModalTitle').textContent = 'Edit Quote';
  document.getElementById('qf-text').value = q.quote_text||'';
  document.getElementById('qf-attr').value = q.attributed_to||'';
  document.getElementById('qf-context').value = q.historical_context||'';
  document.getElementById('qf-topic').value = q.topic_id||'';
  document.getElementById('qf-tags').value = q.tags||'';
  document.getElementById('qf-image').value = q.image_prompt||'';
  document.getElementById('qf-status').value = q.status||'draft';
  document.getElementById('qModal').classList.add('open');
}

function closeModal() { document.getElementById('qModal').classList.remove('open'); }

async function saveQuote(e) {
  e.preventDefault();
  const btn = document.getElementById('qSaveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const body = {
    quote_text: document.getElementById('qf-text').value,
    attributed_to: document.getElementById('qf-attr').value,
    historical_context: document.getElementById('qf-context').value,
    topic_id: document.getElementById('qf-topic').value || null,
    tags: document.getElementById('qf-tags').value,
    image_prompt: document.getElementById('qf-image').value,
    status: document.getElementById('qf-status').value,
  };
  try {
    if (editQId) {
      await fetch(`${API}/cms/api/quotes/${editQId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    } else {
      await fetch(`${API}/cms/api/quotes`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    }
    toast(editQId ? 'Quote updated!' : 'Quote saved!', 'success');
    closeModal(); loadQuotes();
  } catch(err) { toast('Save failed', 'error'); }
  btn.disabled = false; btn.textContent = 'Save Quote';
}

async function deleteQuote(id) {
  if (!confirm('Delete this quote?')) return;
  await fetch(`${API}/cms/api/quotes/${id}`, { method:'DELETE' });
  toast('Deleted', 'success'); loadQuotes();
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div'); el.className = `toast toast--${type}`; el.textContent = msg;
  c.appendChild(el); setTimeout(() => el.remove(), 3000);
}

init();
</script>
</body>
</html>
