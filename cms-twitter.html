<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Twitter / X Posts — Retrieve Your Roots CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'"/>
  <link rel="stylesheet" href="css/cms.css"/>
</head>
<body>
<div class="cms-layout">
  <aside class="cms-sidebar">
    <div class="cms-sidebar__brand"><div class="cms-sidebar__brand-name">Retrieve Your Roots</div><div class="cms-sidebar__brand-sub">Content Command Center</div></div>
    <nav class="cms-sidebar__nav">
      <div class="cms-nav__section"><div class="cms-nav__section-label">Overview</div></div>
      <a href="cms-dashboard.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Content</div></div>
      <a href="cms-topics.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Historical Topics</a>
      <a href="cms-newsletters.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Newsletter Issues</a>
      <a href="cms-twitter.html" class="cms-nav__item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>Twitter / X Posts</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Assets</div></div>
      <a href="cms-quotes.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>Quotes</a>
      <a href="cms-image-prompts.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Image Prompts</a>
      <a href="cms-sources.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Sources</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Planning</div></div>
      <a href="cms-calendar.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Content Calendar</a>
    </nav>
    <div class="cms-sidebar__footer"><a href="home.html" style="color:var(--gold-dim);font-size:11px;">← Back to site</a></div>
  </aside>

  <div class="cms-main">
    <div class="cms-topbar">
      <div class="cms-topbar__title">Twitter / X Posts</div>
      <div class="cms-topbar__actions">
        <button class="btn btn-primary btn-sm" onclick="openNewModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Post
        </button>
      </div>
    </div>

    <div class="cms-page">
      <div class="section-header">
        <div class="section-header__left">
          <div class="section-eyebrow">Social Media</div>
          <div class="section-title">X / Twitter Posts</div>
        </div>
        <div class="filter-bar" style="margin:0">
          <select class="filter-select" id="typeFilter" onchange="loadPosts()">
            <option value="">All Types</option>
            <option value="single post">Single Post</option>
            <option value="thread">Thread</option>
            <option value="quote post">Quote Post</option>
            <option value="image post">Image Post</option>
            <option value="newsletter promo">Newsletter Promo</option>
            <option value="did you know">Did You Know</option>
            <option value="on this day">On This Day</option>
          </select>
          <select class="filter-select" id="statusFilter" onchange="loadPosts()">
            <option value="">All Statuses</option>
            <option value="draft">Draft</option>
            <option value="reviewed">Reviewed</option>
            <option value="scheduled">Scheduled</option>
            <option value="published">Published</option>
          </select>
        </div>
      </div>

      <div id="postsList">
        <div style="text-align:center;padding:40px;color:var(--text-muted)">Loading…</div>
      </div>
    </div>
  </div>
</div>

<!-- New/Edit Post Modal -->
<div class="modal-overlay" id="postModal">
  <div class="modal" style="max-width:680px;max-height:90vh;overflow-y:auto">
    <div class="modal__header">
      <div class="modal__title" id="postModalTitle">New X Post</div>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <form id="postForm" onsubmit="savePost(event)">
      <div class="form-grid" style="gap:14px">
        <div class="form-group">
          <label class="form-label">Post Type *</label>
          <select class="form-select" id="pf-type" required>
            <option value="single post">Single Post</option>
            <option value="thread">Thread</option>
            <option value="quote post">Quote Post</option>
            <option value="image post">Image Post</option>
            <option value="newsletter promo">Newsletter Promo</option>
            <option value="did you know">Did You Know</option>
            <option value="on this day">On This Day</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="pf-status">
            <option value="draft">Draft</option>
            <option value="reviewed">Reviewed</option>
            <option value="scheduled">Scheduled</option>
            <option value="published">Published</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Linked Topic</label>
          <select class="form-select" id="pf-topic"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Scheduled Date</label>
          <input type="date" class="form-input" id="pf-scheduled"/>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Hook (opening line)</label>
          <input type="text" class="form-input" id="pf-hook" placeholder="The sentence that stops the scroll…"/>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Post Body</label>
          <textarea class="form-textarea" id="pf-body" rows="4" placeholder="Full post text (max 280 chars for single post)…"></textarea>
          <div class="form-hint" id="charCount">0 / 280</div>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Thread Content</label>
          <textarea class="form-textarea form-textarea--tall" id="pf-thread" rows="8" placeholder="For threads: number each tweet and separate with blank lines. Each tweet max 280 chars."></textarea>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Hashtags</label>
          <input type="text" class="form-input" id="pf-hashtags" placeholder="#BlackHistory #AfricanHistory #HiddenHistory"/>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Image Prompt</label>
          <textarea class="form-textarea" id="pf-image" rows="3" placeholder="Cinematic image generation prompt for this post…"></textarea>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Engagement Notes</label>
          <input type="text" class="form-input" id="pf-engagement" placeholder="Post-publish notes on engagement…"/>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="postSaveBtn">Save Post</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="viewModal">
  <div class="modal" style="max-width:620px;max-height:90vh;overflow-y:auto">
    <div class="modal__header">
      <div class="modal__title">Post Preview</div>
      <button class="modal__close" onclick="closeViewModal()">✕</button>
    </div>
    <div id="viewBody"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'http://localhost:3001';
let editPostId = null;
let topicsList = [];

async function init() {
  topicsList = await fetch(`${API}/cms/api/topics`).then(r=>r.json()).catch(()=>[]);
  const sel = document.getElementById('pf-topic');
  sel.innerHTML = '<option value="">No linked topic</option>' + topicsList.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join('');
  loadPosts();
  document.getElementById('pf-body').addEventListener('input', () => {
    const n = document.getElementById('pf-body').value.length;
    document.getElementById('charCount').textContent = `${n} / 280${n>280?' ⚠️ over limit':''}`;
    document.getElementById('charCount').style.color = n > 280 ? '#f87171' : 'var(--text-muted)';
  });
}

async function loadPosts() {
  const type = document.getElementById('typeFilter').value;
  const status = document.getElementById('statusFilter').value;
  let url = `${API}/cms/api/twitter?`;
  if (type) url += `post_type=${encodeURIComponent(type)}&`;
  if (status) url += `status=${status}`;
  try {
    const posts = await fetch(url).then(r=>r.json());
    const div = document.getElementById('postsList');
    if (!posts.length) {
      div.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🐦</div><div class="empty-state__title">No posts yet</div><div class="empty-state__sub">Generate from a topic on the Dashboard or create manually</div><button class="btn btn-primary" onclick="openNewModal()">New Post</button></div>`;
      return;
    }
    div.innerHTML = `<div class="table-wrap"><table class="cms-table"><thead><tr><th>#</th><th>Hook</th><th>Type</th><th>Topic</th><th>Status</th><th>Scheduled</th><th></th></tr></thead><tbody>` +
      posts.map(p=>`<tr>
        <td style="color:var(--text-muted);font-size:12px">${p.id}</td>
        <td class="td-title td-truncate" style="max-width:240px">${esc(p.hook||p.post_body||'—')}</td>
        <td><span class="cat-pill">${esc(p.post_type)}</span></td>
        <td style="font-size:12px;color:var(--text-tertiary)">${esc(p.topic_title||'—')}</td>
        <td><span class="status-badge status-badge--${p.status}">${p.status}</span></td>
        <td style="font-size:12px;color:var(--text-muted)">${p.scheduled_date||'—'}</td>
        <td><div class="row-actions">
          <button class="btn btn-ghost btn-sm" onclick="viewPost(${p.id})">View</button>
          <button class="btn btn-ghost btn-sm" onclick="editPost(${p.id})">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:#f87171" onclick="deletePost(${p.id})">Del</button>
        </div></td>
      </tr>`).join('') + '</tbody></table></div>';
  } catch(e) {
    document.getElementById('postsList').innerHTML = `<div style="color:#f87171;padding:32px;text-align:center">Could not connect to CMS server.</div>`;
  }
}

function openNewModal() {
  editPostId = null;
  document.getElementById('postModalTitle').textContent = 'New X Post';
  document.getElementById('postForm').reset();
  document.getElementById('postModal').classList.add('open');
}

async function editPost(id) {
  editPostId = id;
  const p = await fetch(`${API}/cms/api/twitter/${id}`).then(r=>r.json());
  document.getElementById('postModalTitle').textContent = 'Edit X Post';
  document.getElementById('pf-type').value = p.post_type||'single post';
  document.getElementById('pf-status').value = p.status||'draft';
  document.getElementById('pf-topic').value = p.topic_id||'';
  document.getElementById('pf-scheduled').value = p.scheduled_date||'';
  document.getElementById('pf-hook').value = p.hook||'';
  document.getElementById('pf-body').value = p.post_body||'';
  document.getElementById('pf-thread').value = p.thread_content||'';
  document.getElementById('pf-hashtags').value = p.hashtags||'';
  document.getElementById('pf-image').value = p.image_prompt||'';
  document.getElementById('pf-engagement').value = p.engagement_notes||'';
  document.getElementById('postModal').classList.add('open');
}

async function viewPost(id) {
  const p = await fetch(`${API}/cms/api/twitter/${id}`).then(r=>r.json());
  document.getElementById('viewBody').innerHTML = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      <span class="cat-pill">${esc(p.post_type)}</span>
      <span class="status-badge status-badge--${p.status}">${p.status}</span>
      ${p.topic_title ? `<span class="cat-pill" style="background:rgba(201,168,76,.06)">${esc(p.topic_title)}</span>` : ''}
    </div>
    ${p.hook ? `<div style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:12px">${esc(p.hook)}</div>` : ''}
    ${p.post_body ? `<div style="background:var(--surface-2);border-radius:12px;padding:16px;font-size:14px;color:var(--text-secondary);line-height:1.65;margin-bottom:16px;border:1px solid var(--border)">${esc(p.post_body).replace(/\n/g,'<br>')}</div>` : ''}
    ${p.thread_content ? `<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px">Thread</div><div style="background:var(--surface-2);border-radius:12px;padding:16px;font-size:13px;color:var(--text-secondary);line-height:1.7;border:1px solid var(--border)">${esc(p.thread_content).replace(/\n/g,'<br>')}</div></div>` : ''}
    ${p.hashtags ? `<div style="margin-bottom:12px;font-size:13px;color:var(--status-reviewed)">${esc(p.hashtags)}</div>` : ''}
    ${p.image_prompt ? `<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px">Image Prompt</div><div style="font-size:12px;color:var(--text-muted);font-style:italic">${esc(p.image_prompt)}</div></div>` : ''}
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-ghost btn-sm" onclick="closeViewModal();editPost(${id})">Edit</button>
      <button class="btn btn-secondary btn-sm" onclick="closeViewModal()">Close</button>
    </div>
  `;
  document.getElementById('viewModal').classList.add('open');
}

function closeModal() { document.getElementById('postModal').classList.remove('open'); }
function closeViewModal() { document.getElementById('viewModal').classList.remove('open'); }

async function savePost(e) {
  e.preventDefault();
  const btn = document.getElementById('postSaveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const body = {
    post_type: document.getElementById('pf-type').value,
    status: document.getElementById('pf-status').value,
    topic_id: document.getElementById('pf-topic').value || null,
    scheduled_date: document.getElementById('pf-scheduled').value || null,
    hook: document.getElementById('pf-hook').value,
    post_body: document.getElementById('pf-body').value,
    thread_content: document.getElementById('pf-thread').value,
    hashtags: document.getElementById('pf-hashtags').value,
    image_prompt: document.getElementById('pf-image').value,
    engagement_notes: document.getElementById('pf-engagement').value,
  };
  try {
    if (editPostId) {
      await fetch(`${API}/cms/api/twitter/${editPostId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    } else {
      await fetch(`${API}/cms/api/twitter`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    }
    toast(editPostId ? 'Post updated!' : 'Post created!', 'success');
    closeModal(); loadPosts();
  } catch(err) { toast('Save failed', 'error'); }
  btn.disabled = false; btn.textContent = 'Save Post';
}

async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  await fetch(`${API}/cms/api/twitter/${id}`, { method:'DELETE' });
  toast('Deleted', 'success'); loadPosts();
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div'); el.className = `toast toast--${type}`; el.textContent = msg;
  c.appendChild(el); setTimeout(() => el.remove(), 3000);
}

init();
</script>
</body>
</html>
