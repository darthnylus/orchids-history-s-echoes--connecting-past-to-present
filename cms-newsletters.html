<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Newsletter Issues — Retrieve Your Roots CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'"/>
  <link rel="stylesheet" href="css/cms.css"/>
</head>
<body>
<div class="cms-layout">
  <aside class="cms-sidebar">
    <div class="cms-sidebar__brand"><div class="cms-sidebar__brand-name">Retrieve Your Roots</div><div class="cms-sidebar__brand-sub">Content Command Center</div></div>
    <nav class="cms-sidebar__nav">
      <div class="cms-nav__section"><div class="cms-nav__section-label">Overview</div></div>
      <a href="cms-dashboard.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Content</div></div>
      <a href="cms-topics.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Historical Topics</a>
      <a href="cms-newsletters.html" class="cms-nav__item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Newsletter Issues</a>
      <a href="cms-twitter.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>Twitter / X Posts</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Assets</div></div>
      <a href="cms-quotes.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>Quotes</a>
      <a href="cms-image-prompts.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Image Prompts</a>
      <a href="cms-sources.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Sources</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Planning</div></div>
      <a href="cms-calendar.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Content Calendar</a>
    </nav>
    <div class="cms-sidebar__footer"><a href="home.html" style="color:var(--gold-dim);font-size:11px;">← Back to site</a></div>
  </aside>

  <div class="cms-main">
    <div class="cms-topbar">
      <div class="cms-topbar__title">Newsletter Issues</div>
      <div class="cms-topbar__actions">
        <button class="btn btn-primary btn-sm" onclick="openNewModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Issue
        </button>
      </div>
    </div>

    <div class="cms-page">
      <div class="section-header">
        <div class="section-header__left">
          <div class="section-eyebrow">Email Content</div>
          <div class="section-title">Newsletter Issues</div>
        </div>
        <div class="filter-bar" style="margin:0">
          <select class="filter-select" id="statusFilter" onchange="loadNewsletters()">
            <option value="">All Statuses</option>
            <option value="draft">Draft</option>
            <option value="reviewed">Reviewed</option>
            <option value="scheduled">Scheduled</option>
            <option value="published">Published</option>
          </select>
        </div>
      </div>

      <div id="newsletterList">
        <div style="text-align:center;padding:40px;color:var(--text-muted)">Loading…</div>
      </div>
    </div>
  </div>
</div>

<!-- New/Edit Newsletter Modal -->
<div class="modal-overlay" id="nlModal">
  <div class="modal" style="max-width:780px;max-height:90vh;overflow-y:auto">
    <div class="modal__header">
      <div class="modal__title" id="nlModalTitle">New Newsletter Issue</div>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <form id="nlForm" onsubmit="saveNewsletter(event)">
      <div class="form-grid" style="gap:16px">
        <div class="form-col-span form-group">
          <label class="form-label">Issue Title *</label>
          <input type="text" class="form-input" id="nf-title" required placeholder="The Empire They Never Taught You About"/>
        </div>
        <div class="form-group">
          <label class="form-label">Main Topic</label>
          <select class="form-select" id="nf-topic"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="nf-status">
            <option value="draft">Draft</option>
            <option value="reviewed">Reviewed</option>
            <option value="scheduled">Scheduled</option>
            <option value="published">Published</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Scheduled Date</label>
          <input type="date" class="form-input" id="nf-scheduled"/>
        </div>
        <div class="form-group">
          <label class="form-label">Published Date</label>
          <input type="date" class="form-input" id="nf-published"/>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Opening Hook</label>
          <textarea class="form-textarea" id="nf-hook" rows="3" placeholder="The punchy first paragraph that stops the reader…"></textarea>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Main Story</label>
          <textarea class="form-textarea form-textarea--tall" id="nf-story" rows="6" placeholder="The core historical narrative…"></textarea>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Truth vs. Narrative Section</label>
          <textarea class="form-textarea" id="nf-truth" rows="4" placeholder="What the textbooks got wrong…"></textarea>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Quote Section</label>
          <textarea class="form-textarea" id="nf-quote" rows="3" placeholder="A powerful quote relevant to this issue…"></textarea>
        </div>
        <div class="form-col-span form-group">
          <label class="form-label">Call to Action</label>
          <textarea class="form-textarea" id="nf-cta" rows="2" placeholder="Share this. Forward this. Do something with this."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="nlSaveBtn">Save Issue</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="viewModal">
  <div class="modal" style="max-width:720px;max-height:90vh;overflow-y:auto">
    <div class="modal__header">
      <div class="modal__title" id="viewTitle" style="font-family:var(--font-display)"></div>
      <button class="modal__close" onclick="closeViewModal()">✕</button>
    </div>
    <div id="viewBody"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = (() => { const h = window.location.hostname; if (h === 'localhost' && window.location.port !== '3001') return 'http://localhost:3001'; if (h.startsWith('3001-')) return ''; if (h.startsWith('3000-')) return window.location.origin.replace('3000-','3001-'); return ''; })();
let editNlId = null;
let topicsList = [];

async function init() {
  topicsList = await fetch(`${API}/cms/api/topics`).then(r => r.json()).catch(() => []);
  const sel = document.getElementById('nf-topic');
  sel.innerHTML = '<option value="">No linked topic</option>' + topicsList.map(t => `<option value="${t.id}">${esc(t.title)}</option>`).join('');
  loadNewsletters();
}

async function loadNewsletters() {
  const status = document.getElementById('statusFilter').value;
  const url = `${API}/cms/api/newsletters${status ? '?status='+status : ''}`;
  try {
    const items = await fetch(url).then(r => r.json());
    const div = document.getElementById('newsletterList');
    if (!items.length) {
      div.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📰</div><div class="empty-state__title">No newsletter issues yet</div><div class="empty-state__sub">Use AI generation from a topic or create manually</div><button class="btn btn-primary" onclick="openNewModal()">New Issue</button></div>`;
      return;
    }
    div.innerHTML = `<div class="table-wrap"><table class="cms-table"><thead><tr><th>#</th><th>Issue Title</th><th>Linked Topic</th><th>Status</th><th>Scheduled</th><th>Updated</th><th></th></tr></thead><tbody>` +
      items.map(n => `<tr>
        <td style="color:var(--text-muted);font-size:12px">${n.id}</td>
        <td class="td-title">${esc(n.issue_title)}</td>
        <td style="font-size:12px;color:var(--text-tertiary)">${esc(n.topic_title||'—')}</td>
        <td><span class="status-badge status-badge--${n.publish_status}">${n.publish_status}</span></td>
        <td style="font-size:12px;color:var(--text-muted)">${n.scheduled_date||'—'}</td>
        <td style="font-size:12px;color:var(--text-muted)">${fmtDate(n.updated_at)}</td>
        <td><div class="row-actions">
          <a href="cms-newsletter-preview.html?id=${n.id}" class="btn btn-ghost btn-sm" style="color:var(--gold)">Preview</a>
          <button class="btn btn-ghost btn-sm" onclick="viewNewsletter(${n.id})">View</button>
          <button class="btn btn-ghost btn-sm" onclick="editNewsletter(${n.id})">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:#f87171" onclick="deleteNewsletter(${n.id})">Delete</button>
        </div></td>
      </tr>`).join('') +
      '</tbody></table></div>';
  } catch(e) {
    document.getElementById('newsletterList').innerHTML = `<div style="color:#f87171;padding:32px;text-align:center">Could not connect to CMS server on port 3001.</div>`;
  }
}

function openNewModal() {
  editNlId = null;
  document.getElementById('nlModalTitle').textContent = 'New Newsletter Issue';
  document.getElementById('nlForm').reset();
  document.getElementById('nlModal').classList.add('open');
}

async function editNewsletter(id) {
  editNlId = id;
  const n = await fetch(`${API}/cms/api/newsletters/${id}`).then(r => r.json());
  document.getElementById('nlModalTitle').textContent = 'Edit Newsletter Issue';
  document.getElementById('nf-title').value = n.issue_title || '';
  document.getElementById('nf-topic').value = n.main_topic_id || '';
  document.getElementById('nf-status').value = n.publish_status || 'draft';
  document.getElementById('nf-scheduled').value = n.scheduled_date || '';
  document.getElementById('nf-published').value = n.published_date || '';
  document.getElementById('nf-hook').value = n.opening_hook || '';
  document.getElementById('nf-story').value = n.main_story || '';
  document.getElementById('nf-truth').value = n.truth_vs_narrative_section || '';
  document.getElementById('nf-quote').value = n.quote_section || '';
  document.getElementById('nf-cta').value = n.call_to_action || '';
  document.getElementById('nlModal').classList.add('open');
}

async function viewNewsletter(id) {
  const n = await fetch(`${API}/cms/api/newsletters/${id}`).then(r => r.json());
  document.getElementById('viewTitle').textContent = n.issue_title;
  document.getElementById('viewBody').innerHTML = `
    ${n.topic_title ? `<div style="margin-bottom:16px"><span class="cat-pill">Topic: ${esc(n.topic_title)}</span></div>` : ''}
    <div style="margin-bottom:24px">
      <span class="status-badge status-badge--${n.publish_status}">${n.publish_status}</span>
      ${n.scheduled_date ? `<span style="margin-left:12px;font-size:12px;color:var(--text-muted)">Scheduled: ${n.scheduled_date}</span>` : ''}
    </div>
    ${sec('Opening Hook', n.opening_hook)}
    ${sec('Main Story', n.main_story)}
    ${sec('Truth vs. Narrative', n.truth_vs_narrative_section)}
    ${sec('Quote', n.quote_section, true)}
    ${sec('Call to Action', n.call_to_action)}
    <div class="form-actions" style="margin-top:24px">
      <button class="btn btn-gold-outline btn-sm" onclick="closeViewModal();editNewsletter(${id})">Edit</button>
      <button class="btn btn-secondary btn-sm" onclick="closeViewModal()">Close</button>
    </div>
  `;
  document.getElementById('viewModal').classList.add('open');
}

function sec(label, content, isQuote=false) {
  if (!content) return '';
  return `<div style="margin-bottom:20px">
    <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px">${label}</div>
    <div style="font-size:14px;color:var(--text-secondary);line-height:1.7;${isQuote?'border-left:3px solid var(--gold-border);padding-left:16px;font-style:italic;font-family:var(--font-display)':''}">${esc(content)}</div>
  </div>`;
}

function closeViewModal() { document.getElementById('viewModal').classList.remove('open'); }
function closeModal() { document.getElementById('nlModal').classList.remove('open'); }

async function saveNewsletter(e) {
  e.preventDefault();
  const btn = document.getElementById('nlSaveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const body = {
    issue_title: document.getElementById('nf-title').value,
    main_topic_id: document.getElementById('nf-topic').value || null,
    opening_hook: document.getElementById('nf-hook').value,
    main_story: document.getElementById('nf-story').value,
    truth_vs_narrative_section: document.getElementById('nf-truth').value,
    quote_section: document.getElementById('nf-quote').value,
    call_to_action: document.getElementById('nf-cta').value,
    publish_status: document.getElementById('nf-status').value,
    scheduled_date: document.getElementById('nf-scheduled').value || null,
    published_date: document.getElementById('nf-published').value || null,
  };
  try {
    if (editNlId) {
      await fetch(`${API}/cms/api/newsletters/${editNlId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    } else {
      await fetch(`${API}/cms/api/newsletters`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    }
    toast(editNlId ? 'Issue updated!' : 'Issue created!', 'success');
    closeModal();
    loadNewsletters();
  } catch(err) { toast('Save failed', 'error'); }
  btn.disabled = false; btn.textContent = 'Save Issue';
}

async function deleteNewsletter(id) {
  if (!confirm('Delete this newsletter issue?')) return;
  await fetch(`${API}/cms/api/newsletters/${id}`, { method:'DELETE' });
  toast('Deleted', 'success');
  loadNewsletters();
}

function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div'); el.className = `toast toast--${type}`; el.textContent = msg;
  c.appendChild(el); setTimeout(() => el.remove(), 3000);
}

init();
</script>
</body>
</html>
