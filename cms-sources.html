<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <link rel="stylesheet" href="css/cms.css"/>
</head>
<body>
<div class="cms-layout">
  <aside class="cms-sidebar">
    <div class="cms-sidebar__brand"><div class="cms-sidebar__brand-name">Retrieve Your Roots</div><div class="cms-sidebar__brand-sub">Content Command Center</div></div>
    <nav class="cms-sidebar__nav">
      <div class="cms-nav__section"><div class="cms-nav__section-label">Overview</div></div>
      <a href="cms-dashboard.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Content</div></div>
      <a href="cms-topics.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Historical Topics</a>
      <a href="cms-newsletters.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Newsletter Issues</a>
      <a href="cms-twitter.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>Twitter / X Posts</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Assets</div></div>
      <a href="cms-quotes.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>Quotes</a>
      <a href="cms-image-prompts.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Image Prompts</a>
      <a href="cms-sources.html" class="cms-nav__item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Sources</a>
      <div class="cms-nav__section"><div class="cms-nav__section-label">Planning</div></div>
      <a href="cms-calendar.html" class="cms-nav__item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Content Calendar</a>
    </nav>
    <div class="cms-sidebar__footer"><a href="home.html" style="color:var(--gold-dim);font-size:11px;">← Back to site</a></div>
  </aside>

  <div class="cms-main">
    <div class="cms-topbar">
      <div class="cms-topbar__title">Sources</div>
      <div class="cms-topbar__actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Source
        </button>
      </div>
    </div>

    <div class="cms-page">
      <div class="section-header">
        <div class="section-header__left">
          <div class="section-eyebrow">Research Library</div>
          <div class="section-title">Sources &amp; References</div>
        </div>
        <select class="filter-select" id="typeFilter" onchange="loadSources()">
          <option value="">All Types</option>
          <option value="book">Book</option>
          <option value="journal">Academic Journal</option>
          <option value="documentary">Documentary</option>
          <option value="website">Website</option>
          <option value="primary">Primary Source</option>
          <option value="archive">Archive</option>
          <option value="interview">Interview</option>
        </select>
      </div>

      <div id="sourcesList">
        <div style="text-align:center;padding:40px;color:var(--text-muted)">Loading…</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="srcModal">
  <div class="modal" style="max-width:640px;max-height:90vh;overflow-y:auto">
    <div class="modal__header">
      <div class="modal__title" id="srcModalTitle">Add Source</div>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <form id="srcForm" onsubmit="saveSource(event)">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input type="text" class="form-input" id="sf-title" required placeholder="Book/article/source title"/>
        </div>
        <div class="form-grid" style="gap:12px">
          <div class="form-group">
            <label class="form-label">Author</label>
            <input type="text" class="form-input" id="sf-author" placeholder="Author name(s)"/>
          </div>
          <div class="form-group">
            <label class="form-label">Publication / Publisher</label>
            <input type="text" class="form-input" id="sf-pub" placeholder="Publisher or journal name"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Source Type</label>
          <select class="form-select" id="sf-type">
            <option value="">Select type…</option>
            <option value="book">Book</option>
            <option value="journal">Academic Journal</option>
            <option value="documentary">Documentary</option>
            <option value="website">Website</option>
            <option value="primary">Primary Source</option>
            <option value="archive">Archive</option>
            <option value="interview">Interview</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">URL</label>
          <input type="url" class="form-input" id="sf-url" placeholder="https://…"/>
        </div>
        <div class="form-group">
          <label class="form-label">Related Topic</label>
          <select class="form-select" id="sf-topic"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Credibility Notes</label>
          <textarea class="form-textarea" id="sf-cred" rows="3" placeholder="Notes on the source's reliability, bias, or context…"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="srcSaveBtn">Save Source</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'http://localhost:3001';
let editSrcId = null;
let topicsList = [];

async function init() {
  topicsList = await fetch(`${API}/cms/api/topics`).then(r=>r.json()).catch(()=>[]);
  document.getElementById('sf-topic').innerHTML = '<option value="">No related topic</option>' + topicsList.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join('');
  loadSources();
}

async function loadSources() {
  const type = document.getElementById('typeFilter').value;
  const url = `${API}/cms/api/sources${type ? '?source_type='+encodeURIComponent(type) : ''}`;
  try {
    const sources = await fetch(url).then(r=>r.json());
    const div = document.getElementById('sourcesList');
    if (!sources.length) {
      div.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📖</div><div class="empty-state__title">No sources yet</div><div class="empty-state__sub">Build your research library to back every claim</div><button class="btn btn-primary" onclick="openModal()">Add Source</button></div>`;
      return;
    }
    div.innerHTML = `<div class="table-wrap"><table class="cms-table"><thead><tr><th>#</th><th>Title</th><th>Author</th><th>Type</th><th>Topic</th><th>URL</th><th></th></tr></thead><tbody>` +
      sources.map(s=>`<tr>
        <td style="color:var(--text-muted);font-size:12px">${s.id}</td>
        <td class="td-title">${esc(s.title)}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${esc(s.author||'—')}</td>
        <td><span class="cat-pill">${esc(s.source_type||'—')}</span></td>
        <td style="font-size:12px;color:var(--text-tertiary)">${esc(s.topic_title||'—')}</td>
        <td style="font-size:12px">${s.source_url ? `<a href="${esc(s.source_url)}" target="_blank" style="color:var(--gold-dim)">Link ↗</a>` : '—'}</td>
        <td><div class="row-actions">
          <button class="btn btn-ghost btn-sm" onclick="editSource(${s.id})">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:#f87171" onclick="deleteSource(${s.id})">Del</button>
        </div></td>
      </tr>`).join('') + '</tbody></table></div>';
  } catch(e) {
    document.getElementById('sourcesList').innerHTML = `<div style="color:#f87171;padding:32px;text-align:center">Could not connect to CMS server.</div>`;
  }
}

function openModal() {
  editSrcId = null;
  document.getElementById('srcModalTitle').textContent = 'Add Source';
  document.getElementById('srcForm').reset();
  document.getElementById('srcModal').classList.add('open');
}

async function editSource(id) {
  editSrcId = id;
  const sources = await fetch(`${API}/cms/api/sources`).then(r=>r.json());
  const s = sources.find(x=>x.id===id);
  if (!s) return;
  document.getElementById('srcModalTitle').textContent = 'Edit Source';
  document.getElementById('sf-title').value = s.title||'';
  document.getElementById('sf-author').value = s.author||'';
  document.getElementById('sf-pub').value = s.publication||'';
  document.getElementById('sf-type').value = s.source_type||'';
  document.getElementById('sf-url').value = s.source_url||'';
  document.getElementById('sf-topic').value = s.related_topic_id||'';
  document.getElementById('sf-cred').value = s.credibility_notes||'';
  document.getElementById('srcModal').classList.add('open');
}

function closeModal() { document.getElementById('srcModal').classList.remove('open'); }

async function saveSource(e) {
  e.preventDefault();
  const btn = document.getElementById('srcSaveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const body = {
    title: document.getElementById('sf-title').value,
    author: document.getElementById('sf-author').value,
    publication: document.getElementById('sf-pub').value,
    source_type: document.getElementById('sf-type').value,
    source_url: document.getElementById('sf-url').value,
    related_topic_id: document.getElementById('sf-topic').value || null,
    credibility_notes: document.getElementById('sf-cred').value,
  };
  try {
    if (editSrcId) {
      await fetch(`${API}/cms/api/sources/${editSrcId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    } else {
      await fetch(`${API}/cms/api/sources`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    }
    toast(editSrcId ? 'Source updated!' : 'Source saved!', 'success');
    closeModal(); loadSources();
  } catch(err) { toast('Save failed', 'error'); }
  btn.disabled = false; btn.textContent = 'Save Source';
}

async function deleteSource(id) {
  if (!confirm('Delete this source?')) return;
  await fetch(`${API}/cms/api/sources/${id}`, { method:'DELETE' });
  toast('Deleted', 'success'); loadSources();
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div'); el.className = `toast toast--${type}`; el.textContent = msg;
  c.appendChild(el); setTimeout(() => el.remove(), 3000);
}

init();
</script>
</body>
</html>
