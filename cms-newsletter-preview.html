<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Newsletter Preview — Retrieve Your Roots</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'"/>
<link rel="stylesheet" href="css/cms.css"/>
<style>
  :root {
    --paper: #eee7d8;
    --paper-deep: #ded3bf;
    --ink: #261f1a;
    --ink-soft: #4c4037;
    --stone: #342a24;
    --stone-dark: #1f1916;
    --bronze: #b78f3c;
    --bronze-soft: rgba(183,143,60,0.45);
    --taupe: #8a7464;
    --muted: #b8a492;
    --shadow: rgba(24,18,14,0.42);
  }

  /* ── Preview shell ─────────────────────────────────────────────────────── */
  .preview-shell {
    background: var(--ink-2, #111009);
    border-bottom: 1px solid rgba(201,168,76,.15);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    font-family: 'Inter', sans-serif;
  }
  .preview-shell__label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(201,168,76,.55);
  }
  .preview-shell__title {
    font-size: 13px;
    color: rgba(240,234,216,.65);
    font-weight: 500;
    margin-left: 12px;
  }
  .width-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 6px;
    color: rgba(240,234,216,.4);
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 120ms ease;
    font-family: 'Inter', sans-serif;
  }
  .width-btn.active {
    background: rgba(201,168,76,.08);
    border-color: rgba(201,168,76,.45);
    color: #c9a84c;
  }
  .preview-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(201,168,76,.25);
    color: rgba(240,234,216,.55);
    background: transparent;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    transition: all 120ms ease;
  }
  .preview-btn:hover { border-color: rgba(201,168,76,.5); color: rgba(240,234,216,.9); }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #6b7280;
    margin-right: 4px;
  }
  .status-dot--draft     { background: #6b7280; }
  .status-dot--reviewed  { background: #3b82f6; }
  .status-dot--scheduled { background: #f59e0b; }
  .status-dot--published { background: #10b981; }

  /* ── Email wrapper ─────────────────────────────────────────────────────── */
  #emailWrap {
    background: linear-gradient(135deg, #b9ae9d 0%, #cfc5b5 46%, #a99c8c 100%);
    min-height: calc(100vh - 49px);
    padding: 36px 16px;
    transition: all .2s ease;
  }

  /* ── Newspaper email ───────────────────────────────────────────────────── */
  .page {
    max-width: 720px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid rgba(38,31,26,0.12);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 22px 70px var(--shadow);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--ink);
  }
  .page--mobile { max-width: 390px; }

  /* MASTHEAD */
  .masthead {
    position: relative;
    background: linear-gradient(rgba(255,255,255,0.28), rgba(255,255,255,0)), var(--paper);
    padding: 24px 34px 0;
  }
  .masthead-eyebrow,
  .masthead-sub,
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
  }
  .masthead-eyebrow {
    margin-bottom: 8px;
    color: var(--taupe);
    font-size: 10px;
    letter-spacing: 0.16em;
    font-style: italic;
  }
  .rule-thick {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--ink) 8%, var(--ink) 92%, transparent);
  }
  .masthead-name {
    padding: 12px 0 10px;
    color: var(--ink);
    text-align: center;
    text-transform: uppercase;
    font-size: clamp(38px, 7.4vw, 60px);
    font-weight: 900;
    letter-spacing: -0.045em;
    line-height: 0.92;
  }
  .rule-thin {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(38,31,26,0.24), transparent);
  }
  .masthead-sub {
    padding: 9px 0 17px;
    color: #756455;
    font-size: 10px;
    letter-spacing: 0.09em;
    font-style: italic;
  }
  .center-tag {
    color: var(--bronze);
    border: 1px solid rgba(183,143,60,0.34);
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 9px;
    font-style: normal;
    letter-spacing: 0.2em;
    white-space: nowrap;
  }

  /* HERO */
  .hero-full {
    position: relative;
    min-height: 330px;
    background: var(--stone-dark);
    overflow: hidden;
    display: flex;
    align-items: flex-end;
  }
  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    filter: sepia(0.25) contrast(1.1) saturate(0.8);
    opacity: 0.62;
    transform: scale(1.02);
  }
  .hero-hatch {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(52deg, rgba(255,255,255,0.045) 0, rgba(255,255,255,0.045) 1px, transparent 1px, transparent 12px);
    mix-blend-mode: screen;
  }
  .hero-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 68% 16%, rgba(183,143,60,0.22), transparent 28%),
      linear-gradient(to top, rgba(31,25,22,0.98) 0%, rgba(31,25,22,0.72) 45%, rgba(31,25,22,0.22) 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 34px;
  }
  .hero-kicker {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    color: #d6b35a;
    font-size: 9px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
  }
  .hero-kicker::before {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--bronze-soft);
  }
  .hero-title {
    max-width: 540px;
    color: #f2eadc;
    font-size: clamp(30px, 5.4vw, 43px);
    line-height: 1.04;
    font-weight: 500;
    letter-spacing: -0.025em;
  }
  .hero-lede {
    max-width: 460px;
    margin-top: 12px;
    color: #cab89e;
    font-size: 14px;
    line-height: 1.65;
    font-style: italic;
  }

  /* COLUMNS */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    background: var(--stone);
  }
  .col-divider { background: rgba(238,231,216,0.12); }
  .col { display: flex; flex-direction: column; min-width: 0; }
  .tag-bar {
    background: var(--ink);
    padding: 9px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .tag-bar::before {
    content: "";
    width: 16px;
    height: 1px;
    background: rgba(183,143,60,0.55);
    flex-shrink: 0;
  }
  .tag-bar span {
    color: #c2a36e;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .stone-panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 28%), var(--stone);
    padding: 24px 22px 26px;
    flex: 1;
  }
  .sec-body {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.86;
  }
  .dropcap::first-letter {
    float: left;
    padding: 8px 8px 0 0;
    color: #d6b35a;
    font-size: 48px;
    line-height: 0.78;
  }
  .inline-quote {
    margin: 17px 0;
    padding: 13px 15px;
    background: rgba(0,0,0,0.22);
    border-left: 3px solid rgba(183,143,60,0.65);
    border-radius: 0 5px 5px 0;
  }
  .inline-quote p {
    color: #dcc9af;
    font-size: 12px;
    font-style: italic;
    line-height: 1.75;
  }
  .img-block {
    display: block;
    width: 100%;
    height: 182px;
    object-fit: cover;
    filter: sepia(0.18) contrast(1.08) saturate(0.84);
  }
  .img-cap {
    background: var(--stone-dark);
    padding: 7px 14px;
    color: #7c6858;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-align: center;
    font-style: italic;
  }

  /* ORNAMENT */
  .ornament-row {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 13px 32px;
    background: var(--paper);
  }
  .ornament-row span { flex: 1; height: 1px; background: rgba(38,31,26,0.14); }
  .ornament-row em { color: rgba(183,143,60,0.72); font-size: 12px; font-style: normal; }

  /* QUOTE BAND */
  .record-band {
    display: flex;
    gap: 22px;
    align-items: flex-start;
    background: var(--stone-dark);
    padding: 28px 34px;
    border-top: 1px solid rgba(183,143,60,0.14);
    border-bottom: 1px solid rgba(183,143,60,0.14);
  }
  .record-accent {
    flex-shrink: 0;
    width: 3px;
    align-self: stretch;
    background: linear-gradient(var(--bronze), transparent);
    border-radius: 999px;
  }
  .record-label {
    margin-bottom: 11px;
    color: #927b65;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .record-quote {
    color: #decab1;
    font-size: 16px;
    line-height: 1.72;
    font-style: italic;
  }
  .record-attr {
    margin-top: 11px;
    color: #786658;
    font-size: 10px;
    letter-spacing: 0.06em;
  }

  /* SHARE */
  .share-band {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    background: var(--ink);
    padding: 24px 34px;
  }
  .share-copy {
    max-width: 420px;
    color: #ad9a87;
    font-size: 13px;
    line-height: 1.72;
    font-style: italic;
  }
  .share-btn {
    display: inline-block;
    flex-shrink: 0;
    background: #eadcc5;
    color: var(--ink);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-decoration: none;
    text-transform: uppercase;
    transition: transform 160ms ease, background 160ms ease;
  }
  .share-btn:hover { background: #d7c6aa; transform: translateY(-1px); }

  /* FOOTER */
  .footer {
    background: var(--paper);
    border-top: 3px solid var(--ink);
    padding: 15px 34px;
  }
  .footer-brand { color: var(--ink-soft); font-size: 11px; letter-spacing: 0.12em; }
  .footer-right { display: flex; flex-wrap: wrap; gap: 14px; justify-content: flex-end; }
  .footer-right a { color: var(--taupe); font-size: 10px; letter-spacing: 0.08em; text-decoration: none; }
  .footer-right a:hover { color: var(--ink); }

  /* Loading */
  .preview-loading {
    text-align: center;
    padding: 80px 40px;
    color: rgba(240,234,216,.3);
    font-family: 'Inter', sans-serif;
  }

  @media (max-width: 640px) {
    #emailWrap { padding: 18px 10px; }
    .page { border-radius: 6px; }
    .masthead { padding: 20px 20px 0; }
    .masthead-eyebrow, .masthead-sub, .share-band, .footer { flex-direction: column; align-items: center; text-align: center; }
    .masthead-sub span:not(.center-tag) { display: none; }
    .hero-full { min-height: 360px; }
    .hero-content { padding: 30px 22px; }
    .columns { grid-template-columns: 1fr; }
    .col-divider { display: none; }
    .record-band { padding: 26px 22px; }
    .share-band { padding: 24px 22px; }
    .footer { padding: 16px 22px; }
  }
</style>
</head>
<body style="margin:0;padding:0;background:#0a0804">

<!-- Preview toolbar -->
<div class="preview-shell">
  <div style="display:flex;align-items:center">
    <span class="preview-shell__label">Newsletter Preview</span>
    <span class="preview-shell__title" id="shellTitle">Loading…</span>
    <span style="margin-left:10px" id="shellStatus"></span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button class="width-btn active" id="btnDesktop" onclick="setWidth('desktop')">Desktop</button>
    <button class="width-btn" id="btnMobile" onclick="setWidth('mobile')">Mobile</button>
    <a href="cms-newsletters.html" class="preview-btn">← Issues</a>
  </div>
</div>

<!-- Email canvas -->
<div id="emailWrap">
  <div class="preview-loading" id="loadingState">
    <div style="width:24px;height:24px;border:2px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
    Loading newsletter…
  </div>
  <div id="pageEl" style="display:none"></div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
const API = (() => {
  const h = window.location.hostname;
  if (h === 'localhost' && window.location.port !== '3001') return 'http://localhost:3001';
  if (h.startsWith('3001-')) return '';
  if (h.startsWith('3000-')) return window.location.origin.replace('3000-','3001-');
  return '';
})();

const params = new URLSearchParams(location.search);
const nlId = params.get('id') || 1;
let isMobile = false;

function heroImg(n) {
  const text = ((n.issue_title||'') + ' ' + (n.topic_title||'')).toLowerCase();
  if (text.match(/mansa|mali|empire|pilgrimage|richest/)) return 'images/mansa-musa-catalan-atlas.webp';
  if (text.match(/kush|nubia|meroe|pyramids/))            return 'images/meroe-pyramids.webp';
  if (text.match(/pharaoh|egypt|kemet|dynasty/))          return 'images/black-pharaohs.webp';
  if (text.match(/aksum|axum|obelisk/))                   return 'images/axum-obelisk.webp';
  if (text.match(/timbuktu|mosque|djenne|sankore/))       return 'images/sankore-mosque.webp';
  if (text.match(/manuscripts|book|library|scholar/))     return 'images/timbuktu-manuscripts.webp';
  if (text.match(/benin|bronze|warrior/))                 return 'images/benin-bronze-warrior.webp';
  if (text.match(/nzinga|queen|angola/))                  return 'images/nzinga-portrait-lithograph.webp';
  if (text.match(/songhai|askia|sundiata/))               return 'images/songhai-empire.webp';
  if (text.match(/slavery|slave|abolit|freedom/))         return 'images/slave-revolts.webp';
  if (text.match(/redlin|housing/))                       return 'images/holc-redlining-philadelphia.webp';
  if (text.match(/king|mlk|march|civil rights/))          return 'images/march-on-washington-wide.jpg';
  if (text.match(/nixon|southern strategy/))              return 'images/southern-strategy.png';
  return 'images/mansa-musa-catalan-atlas.webp';
}

function para(text) {
  if (!text) return '';
  return text.split('\n\n').filter(Boolean).map(p => `<p style="margin:0 0 14px">${esc(p.trim()).replace(/\n/g,'<br>')}</p>`).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function statusDot(status) {
  return `<span class="status-dot status-dot--${status}"></span><span style="font-size:11px;color:rgba(240,234,216,.45);font-family:Inter,sans-serif">${status}</span>`;
}

async function load() {
  try {
    const n = await fetch(`${API}/cms/api/newsletters/${nlId}`).then(r => r.json());
    if (n.error) throw new Error(n.error);

    document.getElementById('shellTitle').textContent = n.issue_title;
    document.getElementById('shellStatus').innerHTML = statusDot(n.publish_status);

    const today = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    const issueNum = String(n.id).padStart(3, '0');
    const img = heroImg(n);

    const html = `
<div class="page" id="pageInner">

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="masthead-eyebrow">
      <span>Issue ${issueNum} · ${today}</span>
      <span>hello@retrieve-your-roots.com</span>
    </div>
    <div class="rule-thick"></div>
    <h1 class="masthead-name">Retrieve Your Roots</h1>
    <div class="rule-thin"></div>
    <div class="masthead-sub">
      <span>History They Buried.</span>
      <span class="center-tag">✦ TRUTH WE RECOVER ✦</span>
      <span>Stories We Reclaim.</span>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero-full">
    <img class="hero-img" src="${img}" alt="${esc(n.issue_title)}"/>
    <div class="hero-hatch"></div>
    <div class="hero-vignette"></div>
    <div class="hero-content">
      <div class="hero-kicker">This Week's Thread</div>
      <h2 class="hero-title">${esc(n.issue_title)}</h2>
      ${n.opening_hook ? `<p class="hero-lede">${esc(n.opening_hook.split('\n\n')[0])}</p>` : ''}
    </div>
  </section>

  <!-- TWO COLUMNS -->
  <main class="columns">

    <!-- LEFT: Main Story -->
    <section class="col">
      <div class="tag-bar"><span>The History</span></div>
      <div class="stone-panel">
        <div class="sec-body dropcap">
          ${n.main_story ? para(n.main_story) : '<p style="color:rgba(184,164,146,.4);font-style:italic">No story content yet.</p>'}
        </div>
      </div>
      <img class="img-block" src="${img}" alt="${esc(n.issue_title)}"/>
      <div class="img-cap">${n.topic_title ? esc(n.topic_title) : 'Retrieve Your Roots'} · Issue ${issueNum}</div>
    </section>

    <div class="col-divider"></div>

    <!-- RIGHT: Truth vs Narrative -->
    <section class="col">
      <img class="img-block" style="height:198px" src="images/songhai-empire.webp" alt="West Africa"/>
      <div class="img-cap">West Africa · Historical Record</div>
      <div class="tag-bar"><span>Truth vs. Narrative</span></div>
      <div class="stone-panel">
        <div class="sec-body">
          ${n.truth_vs_narrative_section ? para(n.truth_vs_narrative_section) : '<p style="color:rgba(184,164,146,.4);font-style:italic">No truth vs. narrative section yet.</p>'}
        </div>
      </div>
    </section>

    ${n.main_story && n.main_story.length > 400 ? `
    <!-- FULL WIDTH FEATURE PANEL -->
    <section style="grid-column:1/-1;position:relative;overflow:hidden;background:#1f1916;">
      <img src="images/timbuktu-manuscripts.webp" alt="Timbuktu manuscripts"
        style="width:100%;height:260px;object-fit:cover;display:block;filter:sepia(.2) contrast(1.05) brightness(.8);opacity:.9;"/>
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75),rgba(0,0,0,.15))"></div>
      <div style="position:absolute;left:34px;bottom:28px;max-width:500px;z-index:2">
        <div style="font-size:10px;letter-spacing:.24em;color:#d6b35a;margin-bottom:10px;text-transform:uppercase;font-family:Georgia,serif">Scholarship &amp; Legacy</div>
        <div style="font-size:26px;line-height:1.15;color:#f2eadc;margin-bottom:10px;font-family:Georgia,serif">The Knowledge Centers They Erased From Your Textbooks</div>
        <div style="font-size:13px;line-height:1.7;color:#c8b59d;font-family:Georgia,serif">Cities like Timbuktu held thousands of manuscripts on law, astronomy, mathematics, and theology — centuries before colonial rule.</div>
      </div>
    </section>
    ` : ''}

  </main>

  <!-- ORNAMENT -->
  <div class="ornament-row"><span></span><em>✦</em><span></span></div>

  <!-- FROM THE RECORD -->
  ${n.quote_section ? `
  <section class="record-band">
    <div class="record-accent"></div>
    <div>
      <div class="record-label">From the Record</div>
      <div class="record-quote">${esc(n.quote_section)}</div>
    </div>
  </section>` : ''}

  <!-- SHARE / CTA -->
  <section class="share-band">
    <p class="share-copy">${n.call_to_action ? esc(n.call_to_action) : 'Share this issue. Forward it. Keep the record alive.'}</p>
    <a class="share-btn" href="mailto:?subject=Retrieve Your Roots — Issue ${issueNum}&body=Read this issue: https://retrieve-your-roots.com">Share Issue →</a>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-brand">Retrieve Your Roots · @Chain_hello</div>
    <div class="footer-right">
      <a href="https://retrieve-your-roots.com/newsletter">Read on the web</a>
      <a href="https://x.com/Chain_hello">@Chain_hello</a>
      <a href="#">Unsubscribe</a>
    </div>
  </footer>

</div>`;

    const pageEl = document.getElementById('pageEl');
    pageEl.innerHTML = html;
    document.getElementById('loadingState').style.display = 'none';
    pageEl.style.display = 'block';

  } catch(e) {
    document.getElementById('loadingState').innerHTML = `<div style="color:#f87171;font-family:Inter,sans-serif">Could not load newsletter.<br><small style="opacity:.6">${e.message}</small></div>`;
  }
}

function setWidth(mode) {
  isMobile = mode === 'mobile';
  document.getElementById('btnDesktop').classList.toggle('active', !isMobile);
  document.getElementById('btnMobile').classList.toggle('active', isMobile);
  const inner = document.getElementById('pageInner');
  if (inner) inner.classList.toggle('page--mobile', isMobile);
}

load();
</script>
