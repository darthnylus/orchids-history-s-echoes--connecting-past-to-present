<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Newsletter Preview — Retrieve Your Roots</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'"/>
<link rel="stylesheet" href="css/cms.css"/>
<style>
  :root {
    --paper: #eee7d8;
    --paper-deep: #ded3bf;
    --ink: #261f1a;
    --ink-soft: #4c4037;
    --stone: #342a24;
    --stone-dark: #1f1916;
    --bronze: #b78f3c;
    --bronze-soft: rgba(183,143,60,0.45);
    --taupe: #8a7464;
    --muted: #b8a492;
    --shadow: rgba(24,18,14,0.42);
  }

  /* ── Preview shell ─────────────────────────────────────────────────────── */
  .preview-shell {
    background: var(--ink-2, #111009);
    border-bottom: 1px solid rgba(201,168,76,.15);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    font-family: 'Inter', sans-serif;
  }
  .preview-shell__label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(201,168,76,.55);
  }
  .preview-shell__title {
    font-size: 13px;
    color: rgba(240,234,216,.65);
    font-weight: 500;
    margin-left: 12px;
  }
  .width-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 6px;
    color: rgba(240,234,216,.4);
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 120ms ease;
    font-family: 'Inter', sans-serif;
  }
  .width-btn.active {
    background: rgba(201,168,76,.08);
    border-color: rgba(201,168,76,.45);
    color: #c9a84c;
  }
  .preview-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(201,168,76,.25);
    color: rgba(240,234,216,.55);
    background: transparent;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    transition: all 120ms ease;
  }
  .preview-btn:hover { border-color: rgba(201,168,76,.5); color: rgba(240,234,216,.9); }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #6b7280;
    margin-right: 4px;
  }
  .status-dot--draft     { background: #6b7280; }
  .status-dot--reviewed  { background: #3b82f6; }
  .status-dot--scheduled { background: #f59e0b; }
  .status-dot--published { background: #10b981; }

  /* ── Email wrapper ─────────────────────────────────────────────────────── */
  #emailWrap {
    background: linear-gradient(135deg, #b9ae9d 0%, #cfc5b5 46%, #a99c8c 100%);
    min-height: calc(100vh - 49px);
    padding: 36px 16px;
    transition: all .2s ease;
  }

  /* ── Newspaper email ───────────────────────────────────────────────────── */
  .page {
    max-width: 720px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid rgba(38,31,26,0.12);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 22px 70px var(--shadow);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--ink);
  }
  .page--mobile { max-width: 390px; }

  /* MASTHEAD */
  .masthead {
    position: relative;
    background: linear-gradient(rgba(255,255,255,0.28), rgba(255,255,255,0)), var(--paper);
    padding: 24px 34px 0;
  }
  .masthead-eyebrow,
  .masthead-sub,
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
  }
  .masthead-eyebrow {
    margin-bottom: 8px;
    color: var(--taupe);
    font-size: 10px;
    letter-spacing: 0.16em;
    font-style: italic;
  }
  .rule-thick {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--ink) 8%, var(--ink) 92%, transparent);
  }
  .masthead-name {
    padding: 12px 0 10px;
    color: var(--ink);
    text-align: center;
    text-transform: uppercase;
    font-size: clamp(38px, 7.4vw, 60px);
    font-weight: 900;
    letter-spacing: -0.045em;
    line-height: 0.92;
  }
  .rule-thin {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(38,31,26,0.24), transparent);
  }
  .masthead-sub {
    padding: 9px 0 17px;
    color: #756455;
    font-size: 10px;
    letter-spacing: 0.09em;
    font-style: italic;
  }
  .center-tag {
    color: var(--bronze);
    border: 1px solid rgba(183,143,60,0.34);
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 9px;
    font-style: normal;
    letter-spacing: 0.2em;
    white-space: nowrap;
  }

  /* HERO */
  .hero-full {
    position: relative;
    min-height: 330px;
    background: var(--stone-dark);
    overflow: hidden;
    display: flex;
    align-items: flex-end;
  }
  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    filter: sepia(0.25) contrast(1.1) saturate(0.8);
    opacity: 0.62;
    transform: scale(1.02);
  }
  .hero-hatch {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(52deg, rgba(255,255,255,0.045) 0, rgba(255,255,255,0.045) 1px, transparent 1px, transparent 12px);
    mix-blend-mode: screen;
  }
  .hero-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 68% 16%, rgba(183,143,60,0.22), transparent 28%),
      linear-gradient(to top, rgba(31,25,22,0.98) 0%, rgba(31,25,22,0.72) 45%, rgba(31,25,22,0.22) 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 34px;
  }
  .hero-kicker {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    color: #d6b35a;
    font-size: 9px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
  }
  .hero-kicker::before {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--bronze-soft);
  }
  .hero-title {
    max-width: 540px;
    color: #f2eadc;
    font-size: clamp(30px, 5.4vw, 43px);
    line-height: 1.04;
    font-weight: 500;
    letter-spacing: -0.025em;
  }
  .hero-lede {
    max-width: 460px;
    margin-top: 12px;
    color: #cab89e;
    font-size: 14px;
    line-height: 1.65;
    font-style: italic;
  }

  /* COLUMNS */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    background: var(--stone);
  }
  .col-divider { background: rgba(238,231,216,0.12); }
  .col { display: flex; flex-direction: column; min-width: 0; }
  .tag-bar {
    background: var(--ink);
    padding: 9px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .tag-bar::before {
    content: "";
    width: 16px;
    height: 1px;
    background: rgba(183,143,60,0.55);
    flex-shrink: 0;
  }
  .tag-bar span {
    color: #c2a36e;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .stone-panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 28%), var(--stone);
    padding: 24px 22px 26px;
    flex: 1;
  }
  .sec-body {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.86;
  }
  .dropcap::first-letter {
    float: left;
    padding: 8px 8px 0 0;
    color: #d6b35a;
    font-size: 48px;
    line-height: 0.78;
  }
  .inline-quote {
    margin: 17px 0;
    padding: 13px 15px;
    background: rgba(0,0,0,0.22);
    border-left: 3px solid rgba(183,143,60,0.65);
    border-radius: 0 5px 5px 0;
  }
  .inline-quote p {
    color: #dcc9af;
    font-size: 12px;
    font-style: italic;
    line-height: 1.75;
  }
  .img-block {
    display: block;
    width: 100%;
    height: 182px;
    object-fit: cover;
    filter: sepia(0.18) contrast(1.08) saturate(0.84);
  }
  .img-cap {
    background: var(--stone-dark);
    padding: 7px 14px;
    color: #7c6858;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-align: center;
    font-style: italic;
  }

  /* ORNAMENT */
  .ornament-row {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 13px 32px;
    background: var(--paper);
  }
  .ornament-row span { flex: 1; height: 1px; background: rgba(38,31,26,0.14); }
  .ornament-row em { color: rgba(183,143,60,0.72); font-size: 12px; font-style: normal; }

  /* QUOTE BAND */
  .record-band {
    display: flex;
    gap: 22px;
    align-items: flex-start;
    background: var(--stone-dark);
    padding: 28px 34px;
    border-top: 1px solid rgba(183,143,60,0.14);
    border-bottom: 1px solid rgba(183,143,60,0.14);
  }
  .record-accent {
    flex-shrink: 0;
    width: 3px;
    align-self: stretch;
    background: linear-gradient(var(--bronze), transparent);
    border-radius: 999px;
  }
  .record-label {
    margin-bottom: 11px;
    color: #927b65;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .record-quote {
    color: #decab1;
    font-size: 16px;
    line-height: 1.72;
    font-style: italic;
  }
  .record-attr {
    margin-top: 11px;
    color: #786658;
    font-size: 10px;
    letter-spacing: 0.06em;
  }

  /* SHARE */
  .share-band {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    background: var(--ink);
    padding: 24px 34px;
  }
  .share-copy {
    max-width: 420px;
    color: #ad9a87;
    font-size: 13px;
    line-height: 1.72;
    font-style: italic;
  }
  .share-btn {
    display: inline-block;
    flex-shrink: 0;
    background: #eadcc5;
    color: var(--ink);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-decoration: none;
    text-transform: uppercase;
    transition: transform 160ms ease, background 160ms ease;
  }
  .share-btn:hover { background: #d7c6aa; transform: translateY(-1px); }

  /* FOOTER */
  .footer {
    background: var(--paper);
    border-top: 3px solid var(--ink);
    padding: 15px 34px;
  }
  .footer-brand { color: var(--ink-soft); font-size: 11px; letter-spacing: 0.12em; }
  .footer-right { display: flex; flex-wrap: wrap; gap: 14px; justify-content: flex-end; }
  .footer-right a { color: var(--taupe); font-size: 10px; letter-spacing: 0.08em; text-decoration: none; }
  .footer-right a:hover { color: var(--ink); }

  /* Loading */
  .preview-loading {
    text-align: center;
    padding: 80px 40px;
    color: rgba(240,234,216,.3);
    font-family: 'Inter', sans-serif;
  }

  @media (max-width: 640px) {
    #emailWrap { padding: 18px 10px; }
    .page { border-radius: 6px; }
    .masthead { padding: 20px 20px 0; }
    .masthead-eyebrow, .masthead-sub, .share-band, .footer { flex-direction: column; align-items: center; text-align: center; }
    .masthead-sub span:not(.center-tag) { display: none; }
    .hero-full { min-height: 360px; }
    .hero-content { padding: 30px 22px; }
    .columns { grid-template-columns: 1fr; }
    .col-divider { display: none; }
    .record-band { padding: 26px 22px; }
    .share-band { padding: 24px 22px; }
    .footer { padding: 16px 22px; }
  }
</style>
</head>
<body style="margin:0;padding:0;background:#0a0804">

<!-- Preview toolbar -->
<div class="preview-shell">
  <div style="display:flex;align-items:center">
    <span class="preview-shell__label">Newsletter Preview</span>
    <span class="preview-shell__title" id="shellTitle">Loading…</span>
    <span style="margin-left:10px" id="shellStatus"></span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button class="width-btn active" id="btnDesktop" onclick="setWidth('desktop')">Desktop</button>
    <button class="width-btn" id="btnMobile" onclick="setWidth('mobile')">Mobile</button>
    <button class="preview-btn" onclick="openXModal()" style="color:#e2e8f0;border-color:rgba(255,255,255,.2)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.26 5.632L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
      Post to X
    </button>
    <a href="cms-newsletters.html" class="preview-btn">← Issues</a>
  </div>
</div>

<!-- X Thread Modal -->
<div id="xModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:500;overflow-y:auto;padding:32px 16px">
  <div style="max-width:560px;margin:0 auto;background:#0f0f0f;border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.8)">

    <!-- Modal header -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,.08)">
      <div style="display:flex;align-items:center;gap:10px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.26 5.632L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
        <span style="font-family:Inter,sans-serif;font-size:15px;font-weight:700;color:#fff">Post to X / Twitter</span>
      </div>
      <button onclick="closeXModal()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;padding:0 4px;line-height:1">✕</button>
    </div>

    <!-- Account row -->
    <div style="display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid rgba(255,255,255,.06)">
      <div style="width:36px;height:36px;background:linear-gradient(135deg,#c9a84c,#8a6f2e);border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:14px;color:#0a0804;font-family:Inter,sans-serif">R</div>
      <div>
        <div style="font-family:Inter,sans-serif;font-size:13px;font-weight:700;color:#fff">Retrieve Your Roots</div>
        <div style="font-family:Inter,sans-serif;font-size:12px;color:rgba(255,255,255,.45)">@Chain_hello</div>
      </div>
      <div style="margin-left:auto">
        <span style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);padding:3px 10px;border-radius:999px;letter-spacing:.05em">THREAD</span>
      </div>
    </div>

    <!-- Tweets -->
    <div id="xTweets" style="padding:8px 0"></div>

    <!-- Saved indicator -->
    <div id="xSavedBadge" style="display:none;margin:0 22px 4px;padding:10px 14px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:8px;font-family:Inter,sans-serif;font-size:12px;color:#6ee7b7">
      ✓ Thread saved to CMS — <a href="cms-twitter.html" style="color:#6ee7b7;text-decoration:underline">view in X Posts</a>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:10px;padding:16px 22px;border-top:1px solid rgba(255,255,255,.08)">
      <a id="xPostAllBtn" href="#" target="_blank"
        style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;color:#000;padding:12px;border-radius:999px;font-family:Inter,sans-serif;font-size:13px;font-weight:700;text-decoration:none;transition:background .15s">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="black"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.26 5.632L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
        Open X to Post Thread
      </a>
      <button onclick="saveXThread()" id="xSaveBtn"
        style="flex:1;background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.12);padding:12px;border-radius:999px;font-family:Inter,sans-serif;font-size:13px;font-weight:600;cursor:pointer">
        Save to CMS
      </button>
    </div>
  </div>
</div>

<!-- Email canvas -->
<div id="emailWrap">
  <div class="preview-loading" id="loadingState">
    <div style="width:24px;height:24px;border:2px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
    Loading newsletter…
  </div>
  <div id="pageEl" style="display:none"></div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
const API = (() => {
  const h = window.location.hostname;
  if (h === 'localhost' && window.location.port !== '3001') return 'http://localhost:3001';
  if (h.startsWith('3001-')) return '';
  if (h.startsWith('3000-')) return window.location.origin.replace('3000-','3001-');
  return '';
})();

const params = new URLSearchParams(location.search);
const nlId = params.get('id') || 1;
let isMobile = false;

function heroImg(n) {
  const text = ((n.issue_title||'') + ' ' + (n.topic_title||'')).toLowerCase();
  if (text.match(/mansa|mali|empire|pilgrimage|richest/)) return 'images/mansa-musa-catalan-atlas.webp';
  if (text.match(/kush|nubia|meroe|pyramids/))            return 'images/meroe-pyramids.webp';
  if (text.match(/pharaoh|egypt|kemet|dynasty/))          return 'images/black-pharaohs.webp';
  if (text.match(/aksum|axum|obelisk/))                   return 'images/axum-obelisk.webp';
  if (text.match(/timbuktu|mosque|djenne|sankore/))       return 'images/sankore-mosque.webp';
  if (text.match(/manuscripts|book|library|scholar/))     return 'images/timbuktu-manuscripts.webp';
  if (text.match(/benin|bronze|warrior/))                 return 'images/benin-bronze-warrior.webp';
  if (text.match(/nzinga|queen|angola/))                  return 'images/nzinga-portrait-lithograph.webp';
  if (text.match(/songhai|askia|sundiata/))               return 'images/songhai-empire.webp';
  if (text.match(/slavery|slave|abolit|freedom/))         return 'images/slave-revolts.webp';
  if (text.match(/redlin|housing/))                       return 'images/holc-redlining-philadelphia.webp';
  if (text.match(/king|mlk|march|civil rights/))          return 'images/march-on-washington-wide.jpg';
  if (text.match(/nixon|southern strategy/))              return 'images/southern-strategy.png';
  return 'images/mansa-musa-catalan-atlas.webp';
}

function para(text) {
  if (!text) return '';
  return text.split('\n\n').filter(Boolean).map(p => `<p style="margin:0 0 14px">${esc(p.trim()).replace(/\n/g,'<br>')}</p>`).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function statusDot(status) {
  return `<span class="status-dot status-dot--${status}"></span><span style="font-size:11px;color:rgba(240,234,216,.45);font-family:Inter,sans-serif">${status}</span>`;
}

async function load() {
  try {
    const n = await fetch(`${API}/cms/api/newsletters/${nlId}`).then(r => r.json());
    if (n.error) throw new Error(n.error);

    document.getElementById('shellTitle').textContent = n.issue_title;
    document.getElementById('shellStatus').innerHTML = statusDot(n.publish_status);

    const today = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    const issueNum = String(n.id).padStart(3, '0');
    const img = heroImg(n);

    const html = `
<div class="page" id="pageInner">

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="masthead-eyebrow">
      <span>Issue ${issueNum} · ${today}</span>
      <span>hello@retrieve-your-roots.com</span>
    </div>
    <div class="rule-thick"></div>
    <h1 class="masthead-name">Retrieve Your Roots</h1>
    <div class="rule-thin"></div>
    <div class="masthead-sub">
      <span>History They Buried.</span>
      <span class="center-tag">✦ TRUTH WE RECOVER ✦</span>
      <span>Stories We Reclaim.</span>
    </div>
  </header>

      <div class="tag-bar"><span>Truth vs. Narrative</span></div>
      <div class="stone-panel">
        <div class="sec-body">
          ${n.truth_vs_narrative_section ? para(n.truth_vs_narrative_section) : '<p style="color:rgba(184,164,146,.4);font-style:italic">No truth vs. narrative section yet.</p>'}
        </div>
      </div>
    </section>

    ${n.main_story && n.main_story.length > 400 ? `
    <!-- FULL WIDTH FEATURE PANEL -->
    <section style="grid-column:1/-1;position:relative;overflow:hidden;background:#1f1916;">

  <!-- FOOTER -->

</div>`;

    currentNl = n;

    const pageEl = document.getElementById('pageEl');
    pageEl.innerHTML = html;
    document.getElementById('loadingState').style.display = 'none';
    pageEl.style.display = 'block';

  } catch(e) {

function setWidth(mode) {
  isMobile = mode === 'mobile';
  document.getElementById('btnDesktop').classList.toggle('active', !isMobile);
  document.getElementById('btnMobile').classList.toggle('active', isMobile);
  const inner = document.getElementById('pageInner');
  if (inner) inner.classList.toggle('page--mobile', isMobile);
}

// ── X / TWITTER THREAD LOGIC ──────────────────────────────────────────────────
let currentNl = null;
let xThreadTweets = [];

function buildThread(n) {
  const tweets = [];
  const title = n.issue_title || '';
  const hook = (n.opening_hook || '').split('\n\n')[0].trim();
  const story = n.main_story || '';
  const truth = n.truth_vs_narrative_section || '';
  const quote = n.quote_section || '';
  const cta   = n.call_to_action || '';

  // Tweet 1 — hook
  tweets.push(`${hook}\n\n🧵 A thread.`);

  // Tweet 2 — context / setup
  const storyLines = story.split('\n\n').filter(Boolean);
  if (storyLines[0]) {
    let t = storyLines[0].trim();
    if (t.length > 270) t = t.slice(0, 267) + '…';
    tweets.push(t);
  }

  // Tweet 3 — key detail
  if (storyLines[1]) {
    let t = storyLines[1].trim();
    if (t.length > 270) t = t.slice(0, 267) + '…';
    tweets.push(t);
  }

  // Tweet 4 — truth vs narrative
  if (truth) {
    const tLines = truth.split('\n\n').filter(Boolean);
    let t = '🔥 The part they left out:\n\n' + tLines[0].trim();
    if (t.length > 270) t = t.slice(0, 267) + '…';
    tweets.push(t);
    if (tLines[1]) {
      let t2 = tLines[1].trim();
      if (t2.length > 270) t2 = t2.slice(0, 267) + '…';
      tweets.push(t2);
    }
  }

  // Tweet 5 — quote
  if (quote) {
    let q = quote.trim();
    if (q.length > 250) q = q.slice(0, 247) + '…';
    tweets.push(`"${q}"`);
  }

  // Tweet 6 — CTA
  if (cta) {
    let c = cta.split('\n\n')[0].trim();
    if (c.length > 240) c = c.slice(0, 237) + '…';
    tweets.push(`${c}\n\n—@Chain_hello | retrieve-your-roots.com`);
  }

  // Number them
  return tweets.map((t, i) => `${i + 1}/${tweets.length} ${t}`);
}

function tweetEl(text, index, total) {
  const charCount = text.length;
  const over = charCount > 280;
  return `
  <div style="padding:14px 22px;border-bottom:${index < total - 1 ? '1px solid rgba(255,255,255,.06)' : 'none'}">
    <div style="display:flex;gap:10px">
      <div style="width:36px;height:36px;background:linear-gradient(135deg,#c9a84c,#8a6f2e);border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-weight:700;font-size:13px;color:#0a0804;font-family:Inter,sans-serif">R</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span style="font-family:Inter,sans-serif;font-size:13px;font-weight:700;color:#fff">Retrieve Your Roots</span>
          <span style="font-family:Inter,sans-serif;font-size:12px;color:rgba(255,255,255,.4)">@Chain_hello</span>
        </div>
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;color:#e7e9ea;line-height:1.55;white-space:pre-wrap;word-break:break-word">${escHtml(text)}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
          <span style="font-family:Inter,sans-serif;font-size:11px;color:${over ? '#f87171' : 'rgba(255,255,255,.25)'}">${charCount}/280${over ? ' ⚠️' : ''}</span>
          <button onclick="copyTweet(${index})" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:999px;color:rgba(255,255,255,.6);font-size:11px;font-weight:600;padding:3px 12px;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,.13)'" onmouseout="this.style.background='rgba(255,255,255,.07)'">Copy</button>
        </div>
      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openXModal() {
  if (!currentNl) { alert('Newsletter still loading.'); return; }
  xThreadTweets = buildThread(currentNl);

  const container = document.getElementById('xTweets');
  container.innerHTML = xThreadTweets.map((t, i) => tweetEl(t, i, xThreadTweets.length)).join('');

  // Set the "Open X" link to tweet 1
  const firstTweetUrl = 'https://x.com/compose/tweet?text=' + encodeURIComponent(xThreadTweets[0]);
  document.getElementById('xPostAllBtn').href = firstTweetUrl;
  document.getElementById('xSavedBadge').style.display = 'none';
  document.getElementById('xModal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeXModal() {
  document.getElementById('xModal').style.display = 'none';
  document.body.style.overflow = '';
}

function copyTweet(index) {
  navigator.clipboard.writeText(xThreadTweets[index]).then(() => {
    showToast('Tweet copied!');
  }).catch(() => {
    showToast('Copy failed — please select & copy manually');
  });
}

async function saveXThread() {
  if (!xThreadTweets.length || !currentNl) return;
  const btn = document.getElementById('xSaveBtn');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  const body = {
    topic_id: currentNl.main_topic_id || null,
    post_type: 'thread',
    hook: xThreadTweets[0],
    post_body: xThreadTweets[0],
    thread_content: xThreadTweets.join('\n\n---\n\n'),
    hashtags: '#BlackHistory #AfricanHistory #RetrieveYourRoots',
    status: 'reviewed',
  };

  try {
    const r = await fetch(`${API}/cms/api/twitter`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(r => r.json());

    if (r.success) {
      document.getElementById('xSavedBadge').style.display = 'block';
      btn.textContent = '✓ Saved';
      showToast('Thread saved to CMS!');
    }
  } catch(e) {
    btn.textContent = 'Save Failed';
  }
  btn.disabled = false;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a1710;border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:12px 18px;font-family:Inter,sans-serif;font-size:13px;color:#f0ead8;z-index:600;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:toastIn .2s ease';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// Close modal on outside click
document.getElementById('xModal').addEventListener('click', e => {
  if (e.target === document.getElementById('xModal')) closeXModal();
});

load();
</script>

<style>
@keyframes toastIn { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:translateX(0); } }
</style>
